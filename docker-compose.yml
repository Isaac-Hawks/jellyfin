services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: "1000:1000" # Common default; users should change this to their UID:GID
    network_mode: bridge
    ports:
      - "8096:8096" # HTTP port for Jellyfin
    volumes:
      - ./config:/config
      - ./cache:/cache
      - ./media:/media:ro # read-only; Use this so Jellyfin doesn't accidently delete any of your files
  restart: unless-stopped
